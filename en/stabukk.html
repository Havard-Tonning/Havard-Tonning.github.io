    <link rel="alternate" hreflang="en" href="https://iolden.no/en/stabukk.html" />

</head>

<body>
    <g-tag></g-tag>
    <main-header></main-header>
    <hamburger-menu></hamburger-menu>

    <div class="swiper" style="height:fit-content;">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk.jpg" alt="The front of Stabukk Olden. On the table, there is a large bun with a yellow vanilla centre. The glass doors of the cafe features large white letters promoting coffee, ice cream, information and soft serves."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk1.jpg" alt="The front entrance of Stabukk cafe in Olden Norway. Outdoor seating and a rack of postcards can be seen."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk2.jpg" alt="The inside of Stabukk cafe in Olden Norway. Pictures of Olden on the wall, Norwegian postcards and indoor seating."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk3.jpg" alt="Girl holding a cheesecake ice cream in a red cup from Stabukk cafe. She is scooping it up with a wooden spoon."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk4.jpg" alt="The front desk of Stabukk cafe in Olden. A turquoise sign features a stubborn ram alluding to the name of the establishment. An ice cream freezer stands to the left."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk5.jpg" alt="An overhead shot of the ice cream selection at Stabukk cafe in Olden, Norway. A large selection, including chocolate, vanilla, coffee, sherbet and cookies and cream."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk6.jpg" alt="A glass cupboard containing freshly baked pastries, chips and drinks."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk7.jpg" alt="An ice cream cup from Stabukk containing one scoop of red and orange sherbet and on top one scoop of cookies and cream."></div>
            <div class="swiper-slide"><img class="swiper_image" src="./../images/stabukk8.jpg" alt="The turquoise Stabukk sign outside of the cafe in Olden. The middle of the sign contains a ram with large horns. The sign is mounted on a traditional red brick wall."></div>
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>
    <div class="roundedbody">
        <div class="tripstats">
            <div class="statbox" style="font-size: 1rem; background-color: #306EB0;"><br><i class="fa-solid fa-bowl-food" style="font-size: 1.5rem;"></i> <br><br>Café</div>
            <div class="statbox" style="font-size: 1rem; background-color: #3b80c9;"><br><i class="fa-solid fa-clock" style="font-size: 1.5rem;"></i> <br><br>10:00 - 16:00</div>
            <div class="statbox" style="font-size: 1rem; background-color: #5F97D3;"><br><i class="fa-solid fa-money-bill" style="font-size: 1.5rem;"></i> <br><br>50 - 100 kr</div>
        </div>

        <div class="marginbody">
            <h1>Stabukk</h1>
            <p>
                Stabukk is a café that serves waffles, coffee, ice cream, soft serves, buns and shakes. The café has outdoor seating where you can enjoy the summer sun.
                <br><br>
                Stabukk can be found right next to Bunnpris in the centre of Olden.
            </p>
        </div>
    </div>

    <script src="../swiper.js"></script>
